name: Android CI/CD

on:
  push:
    branches: [ "dev", "master" ]
  pull_request:
    branches: [ "dev", "master" ]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            **/build/test-results/
            **/build/reports/tests/
            **/build/reports/lint-results-*.html

  publish-release-apk:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/tracksure.jks

      - name: Build signed release APK
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          K_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          K_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/tracksure.jks \
            -Pandroid.injected.signing.store.password=$KS_PASS \
            -Pandroid.injected.signing.key.alias=$K_ALIAS \
            -Pandroid.injected.signing.key.password=$K_PASS

      - name: Rename release APK to tracksure.apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" | head -n 1)
          cp "$APK_PATH" app/build/outputs/apk/release/tracksure.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tracksure-release-apk
          path: app/build/outputs/apk/release/tracksure.apk

      - name: Publish release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-apk-${{ github.run_number }}-${{ github.run_attempt }}
          name: TrackSure ${{ github.ref_name }} APK #${{ github.run_number }}
          prerelease: ${{ github.ref_name == 'dev' }}
          files: app/build/outputs/apk/release/tracksure.apk
